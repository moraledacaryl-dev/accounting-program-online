name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'cleanup/**'
      - 'recovery/**'
      - 'pass-*/**'
      - 'pass-*'
      - 'hotfix/**'

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      ENVIRONMENT: test
      DATABASE_URL: sqlite:///./ci-accounting.db
      SECRET_KEY: ci-secret-key-do-not-use
      STARTUP_REQUIRE_MIGRATIONS: 'false'
      ALLOW_DEFAULT_ADMIN_BOOTSTRAP: 'false'
      ALLOW_DEMO_SEED: 'false'
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt pytest

      - name: Compile backend
        run: python -m compileall -q app tests

      - name: Validate Alembic revision lengths
        run: |
          python - <<'PY'
          from alembic.config import Config
          from alembic.script import ScriptDirectory

          scripts = ScriptDirectory.from_config(Config('alembic.ini'))
          invalid = [(revision.revision, len(revision.revision)) for revision in scripts.walk_revisions() if len(revision.revision) > 32]
          if invalid:
              raise SystemExit(f'Alembic revision IDs exceed PostgreSQL alembic_version VARCHAR(32): {invalid}')
          PY

      - name: Validate Alembic migration chain
        env:
          DATABASE_URL: sqlite:///./ci-migration.db
        run: |
          rm -f ci-migration.db
          alembic upgrade head
          alembic current

      - name: Run backend tests
        run: |
          rm -f ci-accounting.db
          python -m pytest tests

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: |
          rm -rf .next
          npm run build
