name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'cleanup/**'
      - 'recovery/**'

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      ENVIRONMENT: test
      DATABASE_URL: sqlite:///./ci-accounting.db
      SECRET_KEY: ci-secret-key-do-not-use
      STARTUP_REQUIRE_MIGRATIONS: 'false'
      ALLOW_DEFAULT_ADMIN_BOOTSTRAP: 'false'
      ALLOW_DEMO_SEED: 'false'
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt pytest

      - name: Run backend tests
        run: python -m pytest tests

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-python@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
