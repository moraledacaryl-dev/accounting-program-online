server {
    listen 80;
    server_name hiddenoasis.app www.hiddenoasis.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://hiddenoasis.app$request_uri;
    }
}

server {
    listen 80;
    server_name pos.hiddenoasis.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://pos.hiddenoasis.app$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name hiddenoasis.app www.hiddenoasis.app;

    ssl_certificate /etc/letsencrypt/live/hiddenoasis.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hiddenoasis.app/privkey.pem;

    client_max_body_size 20m;

    location = /healthz {
        proxy_pass http://127.0.0.1:8100/healthz;
        include proxy_params;
    }

    location = /healthz/details {
        proxy_pass http://127.0.0.1:8100/healthz/details;
        include proxy_params;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8100;
        include proxy_params;
    }

    location /uploads/ {
        alias /var/lib/hiddenoasis/accounting/uploads/;
        add_header Cache-Control "private, max-age=3600";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:3100;
        include proxy_params;
    }
}

server {
    listen 443 ssl http2;
    server_name pos.hiddenoasis.app;

    ssl_certificate /etc/letsencrypt/live/pos.hiddenoasis.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pos.hiddenoasis.app/privkey.pem;

    client_max_body_size 20m;

    location = /healthz {
        proxy_pass http://127.0.0.1:8200/healthz;
        include proxy_params;
    }

    location = /healthz/details {
        proxy_pass http://127.0.0.1:8200/healthz/details;
        include proxy_params;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8200;
        include proxy_params;
    }

    location / {
        proxy_pass http://127.0.0.1:3200;
        include proxy_params;
    }
}
